services:

  db:
    image: postgres:16
    container_name: synresins_db
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: synresins_backend

    env_file:
      - .env

    environment:
      RAILS_ENV: development

    volumes:
      - ./backend:/app

    ports:
      - "3000:3000"

    depends_on:
      db:
        condition: service_healthy

    command: >
      bash -c "
      rm -f tmp/pids/server.pid &&
      bundle exec rails s -b 0.0.0.0 -p 3000
      "

  forecasting:
    build:
      context: ./forecasting
      dockerfile: Dockerfile

    container_name: synresins_forecasting

    env_file:
      - .env

    volumes:
      - ./forecasting:/app

    ports:
      - "8001:8001"

    command: >
      uvicorn app:app
      --host 0.0.0.0
      --port 8001
      --reload

  client:
    build:
      context: ./client
      dockerfile: Dockerfile

    container_name: synresins_client

    env_file:
      - .env

    volumes:
      - ./client:/app
      - /app/node_modules

    ports:
      - "4000:4000"

    depends_on:
      - backend

    command: >
      npm run dev

volumes:
  postgres_data: